<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f0f">
    <title>Continuum Chat</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #242424;
            --text: #ececec;
            --text-secondary: #9e9e9e;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.3);
            --user-bubble: #2a2a3e;
            --ai-bubble: #1a1a24;
            --border: #2a2a2a;
            --danger: #e74c3c;
            --success: #2ecc71;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --radius: 18px;
            --radius-sm: 12px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            width: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        /* === App Shell === */
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        /* === Header === */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10;
            flex-shrink: 0;
            padding-top: max(12px, env(safe-area-inset-top, 0px));
        }

        .header-logo {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), #a29bfe);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: white;
            flex-shrink: 0;
        }

        .header-info { flex: 1; min-width: 0; }
        .header-title { font-size: 15px; font-weight: 600; }
        .header-subtitle { font-size: 11px; color: var(--text-secondary); }

        .header-actions { display: flex; gap: 6px; flex-shrink: 0; }

        .btn-icon {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
        }
        .btn-icon:active { background: var(--accent); color: white; border-color: var(--accent); transform: scale(0.95); }

        /* === Messages === */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .messages::-webkit-scrollbar { width: 3px; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* Welcome screen */
        .welcome {
            text-align: center;
            padding: 40px 20px;
            animation: fadeIn 0.5s ease;
        }
        .welcome-icon {
            font-size: 56px;
            margin-bottom: 16px;
            animation: pulse 2s infinite;
        }
        .welcome-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .welcome-subtitle { color: var(--text-secondary); font-size: 14px; line-height: 1.5; max-width: 280px; margin: 0 auto 24px; }
        .welcome-stats { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .stat-pill {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stat-pill .stat-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
        .stat-pill strong { color: var(--text); }

        /* Message bubbles */
        .msg {
            display: flex;
            gap: 10px;
            max-width: 90%;
            animation: slideUp 0.3s ease;
        }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg.ai { align-self: flex-start; }

        .msg-avatar {
            width: 30px; height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        .msg.user .msg-avatar { background: var(--accent); color: white; }
        .msg.ai .msg-avatar { background: var(--surface2); color: var(--text-secondary); }

        .msg-content {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .msg.user .msg-content {
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
        }
        .msg.ai .msg-content {
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .msg.ai .msg-content pre {
            background: var(--bg);
            border-radius: 8px;
            padding: 12px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 12px;
        }
        .msg.ai .msg-content code {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
            background: var(--bg);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }
        .typing-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--text-secondary);
            animation: typingBounce 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        /* === Input === */
        .input-area {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            padding-bottom: calc(12px + var(--safe-bottom));
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 6px 8px 6px 16px;
            transition: border-color 0.2s;
        }
        .input-row:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

        .input-row textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: var(--font);
            font-size: 15px;
            resize: none;
            outline: none;
            padding: 8px 0;
            max-height: 120px;
            line-height: 1.5;
        }
        .input-row textarea::placeholder { color: var(--text-secondary); }

        .send-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            font-size: 18px;
        }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .send-btn:not(:disabled):active { transform: scale(0.92); background: #5b4bd5; }

        /* === Controls bar === */
        .controls-bar {
            display: flex;
            gap: 6px;
            padding: 4px 16px 10px;
            flex-wrap: wrap;
        }
        .chip {
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .chip.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* Status bar */
        .status-bar {
            font-size: 10px;
            color: var(--text-secondary);
            text-align: center;
            padding: 2px 16px 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--success); }
        .status-dot.offline { background: var(--danger); }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Mobile landscape adjustments */
        @media (min-width: 600px) {
            .msg { max-width: 75%; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <div class="header-logo">C</div>
            <div class="header-info">
                <div class="header-title">Continuum Nano</div>
                <div class="header-subtitle" id="statusText">~5M params · On-device</div>
            </div>
            <div class="header-actions">
                <button class="btn-icon" onclick="newConversation()" title="New chat">✕</button>
            </div>
        </div>

        <!-- Messages -->
        <div class="messages" id="messages">
            <div class="welcome" id="welcome">
                <div class="welcome-icon">🧠</div>
                <div class="welcome-title">Continuum SLM</div>
                <div class="welcome-subtitle">
                    A 5M-parameter language model running entirely on your device.
                    No cloud, no latency, no privacy concerns.
                </div>
                <div class="welcome-stats">
                    <div class="stat-pill"><span class="stat-dot"></span> <strong>~5M</strong> params</div>
                    <div class="stat-pill"><span class="stat-dot"></span> <strong>Local</strong> CPU</div>
                    <div class="stat-pill"><span class="stat-dot"></span> <strong>O(1)</strong> memory</div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls-bar">
            <span class="chip active" id="chipCreative" onclick="setPreset('creative')">🎨 Creative</span>
            <span class="chip" id="chipBalanced" onclick="setPreset('balanced')">⚖️ Balanced</span>
            <span class="chip" id="chipPrecise" onclick="setPreset('precise')">🎯 Precise</span>
        </div>

        <!-- Status -->
        <div class="status-bar">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusLabel">Ready</span>
        </div>

        <!-- Input -->
        <div class="input-area">
            <div class="input-row">
                <textarea id="inputBox" rows="1" placeholder="Message Continuum..."
                    onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>↑</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let isGenerating = false;
        let currentPreset = 'balanced';
        const presets = {
            creative: { temperature: 1.0, top_k: 60, top_p: 0.95 },
            balanced:  { temperature: 0.8, top_k: 40, top_p: 0.90 },
            precise:   { temperature: 0.4, top_k: 20, top_p: 0.85 },
        };

        // DOM
        const messagesEl = document.getElementById('messages');
        const inputBox = document.getElementById('inputBox');
        const sendBtn = document.getElementById('sendBtn');
        const welcomeEl = document.getElementById('welcome');
        const statusDot = document.getElementById('statusDot');
        const statusLabel = document.getElementById('statusLabel');
        const statusText = document.getElementById('statusText');

        // Auto-resize input
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
            sendBtn.disabled = !el.value.trim() || isGenerating;
        }

        // Enter to send, Shift+Enter for newline
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // Presets
        function setPreset(name) {
            currentPreset = name;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            document.getElementById('chip' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
        }

        // New conversation
        function newConversation() {
            if (isGenerating) return;
            messagesEl.innerHTML = '';
            messagesEl.appendChild(welcomeEl.cloneNode(true));
            fetch('/api/conversation/new', { method: 'POST' }).catch(() => {});
        }

        // Add message to UI
        function addMessage(text, role) {
            if (welcomeEl.parentNode) welcomeEl.remove();
            const msg = document.createElement('div');
            msg.className = 'msg ' + role;
            msg.innerHTML = `
                <div class="msg-avatar">${role === 'user' ? 'U' : 'C'}</div>
                <div class="msg-content">${escapeHtml(text)}</div>
            `;
            messagesEl.appendChild(msg);
            scrollToBottom();
        }

        // Add streaming message placeholder
        function addStreamingMessage() {
            if (welcomeEl.parentNode) welcomeEl.remove();
            const msg = document.createElement('div');
            msg.className = 'msg ai';
            msg.id = 'streamingMsg';
            msg.innerHTML = `
                <div class="msg-avatar">C</div>
                <div class="msg-content"><span id="streamingContent"></span><span class="typing-indicator" id="typingDots"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></span></div>
            `;
            messagesEl.appendChild(msg);
            scrollToBottom();
        }

        // Append token to streaming message
        function appendToken(token) {
            const content = document.getElementById('streamingContent');
            const dots = document.getElementById('typingDots');
            if (content) content.textContent += token;
            if (dots && content.textContent.length > 10) dots.style.display = 'none';
            scrollToBottom();
        }

        // Finalize streaming message
        function finalizeStreaming() {
            const dots = document.getElementById('typingDots');
            if (dots) dots.remove();
        }

        // Send message
        async function sendMessage() {
            const message = inputBox.value.trim();
            if (!message || isGenerating) return;

            isGenerating = true;
            sendBtn.disabled = true;
            inputBox.value = '';
            inputBox.style.height = 'auto';
            updateStatus('generating');

            addMessage(message, 'user');
            addStreamingMessage();

            const preset = presets[currentPreset];

            try {
                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        temperature: preset.temperature,
                        top_k: preset.top_k,
                        top_p: preset.top_p,
                        max_tokens: 256,
                    }),
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.done) {
                                    finalizeStreaming();
                                } else if (data.token) {
                                    appendToken(data.token);
                                }
                            } catch (e) {}
                        }
                    }
                }
            } catch (e) {
                appendToken('\n\n[Connection lost. Check server.]');
                finalizeStreaming();
            }

            isGenerating = false;
            sendBtn.disabled = !inputBox.value.trim();
            updateStatus('ready');
            inputBox.focus();
        }

        // Status management
        function updateStatus(state) {
            if (state === 'generating') {
                statusDot.className = 'status-dot';
                statusDot.style.animation = 'pulse 0.8s infinite';
                statusLabel.textContent = 'Thinking...';
            } else {
                statusDot.className = 'status-dot';
                statusDot.style.animation = '';
                statusLabel.textContent = 'Ready';
            }
        }

        // Helpers
        function scrollToBottom() {
            requestAnimationFrame(() => {
                messagesEl.scrollTop = messagesEl.scrollHeight;
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        // Init
        inputBox.focus();
        fetch('/api/stats').then(r => r.json()).then(s => {
            if (s.mode === 'demo') {
                statusText.textContent = 'Demo mode · UI preview';
            } else {
                statusText.textContent = `${s.model_params?.toLocaleString() || '~5M'} params · ${s.model_size_mb?.toFixed(0) || '20'} MB · On-device`;
            }
        }).catch(() => {});
    </script>
</body>
</html>

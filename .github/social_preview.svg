<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#3fb950;stop-opacity:0.08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- Grid lines -->
  <g opacity="0.03" stroke="#58a6ff">
    <line x1="0" y1="160" x2="1280" y2="160" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke-width="0.5"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke-width="0.5"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke-width="0.5"/>
  </g>

  <!-- Neural network diagram (abstract) -->
  <g transform="translate(80, 100)" opacity="0.6">
    <!-- Layer 1 -->
    <circle cx="0" cy="80" r="6" fill="#58a6ff" opacity="0.7"/>
    <circle cx="0" cy="160" r="6" fill="#58a6ff" opacity="0.7"/>
    <circle cx="0" cy="240" r="6" fill="#58a6ff" opacity="0.7"/>
    <circle cx="0" cy="320" r="6" fill="#58a6ff" opacity="0.7"/>
    <circle cx="0" cy="400" r="6" fill="#58a6ff" opacity="0.7"/>
    <!-- Layer 2 -->
    <circle cx="60" cy="60" r="5" fill="#7ee787" opacity="0.6"/>
    <circle cx="60" cy="140" r="5" fill="#7ee787" opacity="0.6"/>
    <circle cx="60" cy="200" r="5" fill="#7ee787" opacity="0.6"/>
    <circle cx="60" cy="280" r="5" fill="#7ee787" opacity="0.6"/>
    <circle cx="60" cy="360" r="5" fill="#7ee787" opacity="0.6"/>
    <circle cx="60" cy="440" r="5" fill="#7ee787" opacity="0.6"/>
    <!-- Connections L1→L2 -->
    <line x1="6" y1="80" x2="55" y2="60" stroke="#58a6ff" stroke-width="0.5" opacity="0.3"/>
    <line x1="6" y1="80" x2="55" y2="140" stroke="#58a6ff" stroke-width="0.5" opacity="0.3"/>
    <line x1="6" y1="160" x2="55" y2="140" stroke="#58a6ff" stroke-width="0.5" opacity="0.3"/>
    <line x1="6" y1="160" x2="55" y2="200" stroke="#58a6ff" stroke-width="0.5" opacity="0.3"/>
    <line x1="6" y1="240" x2="55" y2="200" stroke="#58a6ff" stroke-width="0.5" opacity="0.3"/>
    <line x1="6" y1="240" x2="55" y2="280" stroke="#58a6ff" stroke-width="0.5" opacity="0.3"/>
    <line x1="6" y1="320" x2="55" y2="280" stroke="#58a6ff" stroke-width="0.5" opacity="0.3"/>
    <line x1="6" y1="320" x2="55" y2="360" stroke="#58a6ff" stroke-width="0.5" opacity="0.3"/>
    <line x1="6" y1="400" x2="55" y2="360" stroke="#58a6ff" stroke-width="0.5" opacity="0.3"/>
    <line x1="6" y1="400" x2="55" y2="440" stroke="#58a6ff" stroke-width="0.5" opacity="0.3"/>
    <!-- Loop arrow -->
    <path d="M 60 250 Q 30 250 30 280 Q 30 310 60 310" fill="none" stroke="#d2a8ff" stroke-width="1.5" opacity="0.5"/>
    <polygon points="60,310 55,305 55,315" fill="#d2a8ff" opacity="0.5"/>
  </g>

  <!-- Right side: Architecture blocks -->
  <g transform="translate(340, 180)">
    <rect x="0" y="0" width="160" height="36" rx="8" fill="#1f2937" stroke="#58a6ff" stroke-width="1"/>
    <text x="80" y="24" font-family="monospace" font-size="13" fill="#58a6ff" text-anchor="middle">GLT Recurrence</text>

    <rect x="0" y="50" width="160" height="36" rx="8" fill="#1f2937" stroke="#7ee787" stroke-width="1"/>
    <text x="80" y="74" font-family="monospace" font-size="13" fill="#7ee787" text-anchor="middle">Anchor Attention</text>

    <rect x="0" y="100" width="160" height="36" rx="8" fill="#1f2937" stroke="#d2a8ff" stroke-width="1"/>
    <text x="80" y="124" font-family="monospace" font-size="13" fill="#d2a8ff" text-anchor="middle">ADL Looping</text>

    <rect x="0" y="150" width="160" height="36" rx="8" fill="#1f2937" stroke="#ffa657" stroke-width="1"/>
    <text x="80" y="174" font-family="monospace" font-size="13" fill="#ffa657" text-anchor="middle">Persistent Memory</text>

    <!-- Arrow -->
    <line x1="80" y1="36" x2="80" y2="48" stroke="#58a6ff" stroke-width="1" opacity="0.5"/>
    <line x1="80" y1="86" x2="80" y2="98" stroke="#7ee787" stroke-width="1" opacity="0.5"/>
    <line x1="80" y1="136" x2="80" y2="148" stroke="#d2a8ff" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Center: Brain icon -->
  <g transform="translate(680, 145)">
    <text font-family="monospace" font-size="100" fill="#58a6ff" opacity="0.15">🧠</text>
  </g>

  <!-- Title -->
  <text x="640" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="bold" fill="#e6edf3" text-anchor="middle" letter-spacing="2">
    NEURON AI
  </text>
  <text x="640" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#8b949e" text-anchor="middle" letter-spacing="1">
    Continuum SLM — Custom Architecture from Scratch
  </text>

  <!-- Subtitle -->
  <text x="640" y="410" font-family="monospace" font-size="15" fill="#58a6ff" text-anchor="middle" opacity="0.8">
    GLT · Anchor Attention · ADL · Persistent Memory Bank
  </text>

  <!-- Bottom stats bar -->
  <g transform="translate(200, 490)">
    <rect x="0" y="0" width="880" height="50" rx="10" fill="#1f2937" stroke="#30363d" stroke-width="1" opacity="0.8"/>
    <text x="100" y="32" font-family="monospace" font-size="14" fill="#8b949e" text-anchor="middle">5M – 100M</text>
    <text x="100" y="48" font-family="monospace" font-size="10" fill="#484f58" text-anchor="middle">Parameter Range</text>
    <line x1="180" y1="10" x2="180" y2="40" stroke="#30363d" stroke-width="1"/>
    <text x="280" y="32" font-family="monospace" font-size="14" fill="#8b949e" text-anchor="middle">O(1) Memory</text>
    <text x="280" y="48" font-family="monospace" font-size="10" fill="#484f58" text-anchor="middle">No Growing Cache</text>
    <line x1="360" y1="10" x2="360" y2="40" stroke="#30363d" stroke-width="1"/>
    <text x="460" y="32" font-family="monospace" font-size="14" fill="#8b949e" text-anchor="middle">1.5hr Training</text>
    <text x="460" y="48" font-family="monospace" font-size="10" fill="#484f58" text-anchor="middle">Free Kaggle GPU</text>
    <line x1="540" y1="10" x2="540" y2="40" stroke="#30363d" stroke-width="1"/>
    <text x="650" y="32" font-family="monospace" font-size="14" fill="#8b949e" text-anchor="middle">Android Ready</text>
    <text x="650" y="48" font-family="monospace" font-size="10" fill="#484f58" text-anchor="middle">INT8 ~100MB</text>
    <line x1="730" y1="10" x2="730" y2="40" stroke="#30363d" stroke-width="1"/>
    <text x="820" y="32" font-family="monospace" font-size="14" fill="#8b949e" text-anchor="middle">From Scratch</text>
    <text x="820" y="48" font-family="monospace" font-size="10" fill="#484f58" text-anchor="middle">Custom Architecture</text>
  </g>

  <!-- License badge -->
  <g transform="translate(1070, 560)">
    <rect x="0" y="0" width="140" height="22" rx="4" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
    <text x="70" y="15" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">⚖️ MIT License</text>
  </g>
</svg>
